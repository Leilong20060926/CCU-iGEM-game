<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3-1 故事</title>
  <link rel="stylesheet" href="../../public/css/shared.css" />
  <link rel="stylesheet" href="../../public/css/text-box.css" />
  <link rel="stylesheet" href="../../public/css/typewriter.css" />
  <style>
    .story-text-box {
      background: rgba(45, 82, 119, 0.85);
      color: white;
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li><a href="../index.html" id="backToGameBtn"><img src="../../public/menu/left.svg" alt="" class="menu-icon"/><span data-zh="回到遊戲" data-en="Back to Game">回到遊戲</span></a></li>
      <li><a href="../menu/star.html"><img src="../../public/menu/star.svg" alt="" class="menu-icon"/><span data-zh="收集結局" data-en="Endings">收集結局</span></a></li>
      <li><a href="../menu/egg.html"><img src="../../public/menu/egg.svg" alt="" class="menu-icon"/><span data-zh="遊戲彩蛋" data-en="Easter Eggs">遊戲彩蛋</span></a></li>
      <li><a href="../menu/doc.html"><img src="../../public/menu/doc.svg" class="menu-icon"/><span data-zh="相關資訊" data-en="Information">相關資訊</span></a></li>
      <li><a href="../menu/info.html"><img src="../../public/menu/info.svg" alt="" class="menu-icon"/><span data-zh="關於我們" data-en="About Us">關於我們</span></a></li>
    </ul>
  </nav>
  <div class="top-left-controls">
    <button class="btn" id="alignBtn" aria-label="Align left">
      <img id="alignIcon" src="../../public/menu/align-left.svg" alt="Align left" />
    </button>
  </div>
  <div class="controls">
    <button class="btn" id="musicBtn" aria-label="Toggle music">
      <img id="musicIcon" src="../../public/menu/music.svg" alt="Music" />
    </button>
    <button class="btn" id="langBtn" aria-label="Toggle language">
      <span id="langText">EN</span>
    </button>
  </div>

  <div class="game-container" id="gameContainer">
    <div class="image-relative-wrapper">
      <div class="story-text-box" id="storyTextBox">
        <div id="storyText" class="story-text"></div>
        <a href="3-2.html" class="story-text-arrow"></a>
      </div>
      <img class="game-image" src="../../public/pictures/3-1.png" alt="3-1 scene" />
    </div>
  </div>

  <script src="../../public/js/shared-controls.js"></script>
  <script src="../../public/js/typewriter.js"></script>
  <script>
    const storyData = {
      zh: '清晨五點，天還沒完全亮，你踩進濕冷的田裡，鞋底沾滿泥水。',
      en: 'It is 5 AM, the sky has not yet fully brightened. You step into the cold, damp field, your shoes caked in mud.'
    };

    function renderStory(lang) {
      const text = storyData[lang] || storyData['zh'];
      // 使用之前修正過的 startTypewriter，確保不會產生疊字
      startTypewriter(text, { 
        onComplete: () => {
          document.querySelector('.story-text-arrow').classList.add('show');
        }
      });
    }

    // 監聽語言切換
    window.addEventListener('languageChanged', (e) => {
      const lang = e.detail.lang;
      // 更新選單
      document.querySelectorAll('[data-zh]').forEach(el => {
        el.innerText = lang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-zh');
      });
      // 更新故事
      renderStory(lang);
    });

    window.addEventListener('load', () => {
      localStorage.setItem('currentGamePage', window.location.href);
      const initialLang = (document.getElementById('langText').innerText === 'ZH') ? 'en' : 'zh';
      renderStory(initialLang);
    });
  </script>
</body>
</html>
