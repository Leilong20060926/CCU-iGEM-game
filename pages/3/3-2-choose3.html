<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3-2-choose</title>
  <link rel="stylesheet" href="../../public/css/shared.css" />
  <link rel="stylesheet" href="../../public/css/text-box.css" />
  <link rel="stylesheet" href="../../public/css/choices-box.css" />
  <style>
.story-text-box.blur {
    filter: blur(5px);
    opacity: 0.5;
  }

  .story-text-box {
    background: rgba(45, 82, 119, 0.92);
    color: white;
  }

  .choices-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2000;
    background: rgba(35, 65, 95, 0.95);
    color: white;
  }

  .choice-button {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: white;
  }

  .choice-button:hover {
    background: rgba(255, 255, 255, 0.2);
    border-color: rgba(255, 255, 255, 0.4);
  }

  .choice-button:active {
    background: rgba(255, 255, 255, 0.3);
  }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li><a href="../index.html"><img src="../../public/menu/left.svg" alt="" class="menu-icon"/><span data-zh="回到遊戲" data-en="Back to Game">回到遊戲</span></a></li>
      <li><a href="../menu/star.html"><img src="../../public/menu/star.svg" alt="" class="menu-icon"/><span data-zh="收集結局" data-en="Endings">收集結局</span></a></li>
      <li><a href="../menu/egg.html"><img src="../../public/menu/egg.svg" alt="" class="menu-icon"/><span data-zh="遊戲彩蛋" data-en="Easter Eggs">遊戲彩蛋</span></a></li>
      <li><a href="../menu/doc.html"><img src="../../public/menu/doc.svg" class="menu-icon"/><span data-zh="相關資訊" data-en="Information">相關資訊</span></a></li>
      <li><a href="../menu/info.html"><img src="../../public/menu/info.svg" alt="" class="menu-icon"/><span data-zh="關於我們" data-en="About Us">關於我們</span></a></li>
    </ul>
  </nav>

  <div class="controls">
    <button class="btn" id="musicBtn"><img id="musicIcon" src="../../public/menu/music.svg" alt="Music" /></button>
    <button class="btn" id="langBtn"><span id="langText">EN</span></button>
  </div>

  <div class="game-container" id="gameContainer">
    <div class="choices-container show" id="choicesContainer">
      <div class="choices-title" data-zh="請選擇你的種植方式：" data-en="Please choose your cultivation method:">請選擇你的種植方式：</div>
      <ul class="choices-list">
        <li><button class="choice-button" data-choice="stable" data-zh="穩定種植" data-en="Stable Cultivation">穩定種植</button></li>
        <li><button class="choice-button" data-choice="limonene" data-zh="使用檸檬烯" data-en="Use Limonene">使用檸檬烯</button></li>
        <li><button class="choice-button" data-choice="money" data-zh="借錢投資" data-en="Borrow Money for Investment">借錢投資</button></li>
        <li><button class="choice-button" data-choice="rest" data-zh="休息" data-en="Rest">休息</button></li>
      </ul>
    </div>

    <div class="image-relative-wrapper">
      <div class="story-text-box blur" id="storyTextBox">
        <div id="storyText" data-zh="接下來，輪到你，接下這片田。" data-en="Now, it is your turn to take over this field.">接下來，輪到你，接下這片田。</div>
      </div>
      <img class="game-image blurred" style="filter: blur(8px);" src="../../public/pictures/3-2.png" alt="3-2 scene" />
    </div>
  </div>

  <script src="../../public/js/shared-controls.js"></script>
  <script>
    window.addEventListener('languageChanged', (e) => {
      const lang = e.detail.lang;
      document.querySelectorAll('[data-zh]').forEach(el => {
        el.innerText = lang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-zh');
      });
    });

    // 處理選擇跳轉
    document.querySelectorAll('.choice-button').forEach(button => {
      button.addEventListener('click', function() {
        const choice = this.getAttribute('data-choice');
        localStorage.setItem('growth_choice', choice);
    
        // 根據選擇的內容跳轉到不同的檔案
        if (choice === 'stable') {
            window.location.href = '3-2-3-1.html'; // 這裡改為你的目標頁面1
        } else if (choice === 'limonene') {
            window.location.href = '3-2-3-2.html'; // 這裡改為你的目標頁面3
        } else if (choice === 'money') {
            window.location.href = '3-3-3.html'; // 這裡改為你的目標頁面4
        } else if (choice === 'rest') {
            window.location.href = '3-4-3.html'; // 這裡改為你的目標頁面5
        }
      });
    });

    window.addEventListener('load', () => {
      localStorage.setItem('currentGamePage', window.location.href);
    });
  </script>
</body>
</html>
