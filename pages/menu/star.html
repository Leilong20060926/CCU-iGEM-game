<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-zh="收集結局 - NoFold" data-en="Endings Collection - NoFold">收集結局 - NoFold</title>
  <link rel="stylesheet" href="../../public/css/shared.css" />
  <style>
    body {
      overflow: hidden;
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
    }

    .achieve-wall-container {
      max-width: 1200px;
      width: 90%;
      max-height: calc(100vh - 120px); 
      margin: 80px auto 40px auto;
      padding: 25px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-sizing: border-box;
      overflow-y: auto; 
      overflow-x: hidden;
    }

    .achieve-wall-container::-webkit-scrollbar {
      width: 8px;
    }
    .achieve-wall-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
    }
    .achieve-wall-container::-webkit-scrollbar-thumb {
      background: rgba(46, 90, 46, 0.4);
      border-radius: 4px;
    }

    .wall-title {
      text-align: center;
      color: #2e5a2e;
      font-size: 28px;
      margin-top: 0;
      margin-bottom: 30px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
    }

    .achieve-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); 
      padding-bottom: 10px;
      gap: 15px;
    }

    .achieve-card {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border: 2px solid #b4dcb4;
      text-align: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .achieve-card:not(.locked) {
      cursor: pointer;
    }
    .achieve-card:not(.locked):hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    .img-wrapper {
      position: relative;
      width: 100%;
      padding-top: 70%; 
      background: #e0e0e0;
      overflow: hidden;
    }

    .achieve-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter 0.3s ease;
    }

    .achieve-name {
      padding: 10px 6px;
      font-size: 14px;
      color: #333;
      font-weight: bold;
      background: #f4fbf4;
      border-top: 1px solid #e2f2e2;
      flex-grow: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .achieve-card.locked .achieve-img {
      filter: grayscale(100%) blur(4px); 
      opacity: 0.4;
    }

    .lock-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 2;
      align-items: center; justify-content: center;
      font-size: 36px; font-weight: bold; color: #888;
      text-shadow: 1px 1px 3px rgba(255,255,255,0.6);
    }

    .achieve-card.locked .lock-overlay { display: flex; }
    .achieve-card.locked .achieve-name { color: #999; background: #eaeaea; }

    @media (max-width: 900px) { .achieve-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px) { .achieve-grid { grid-template-columns: repeat(1, 1fr); } }

    /* ==========================================================================
       結果圖彈窗 Lightbox 樣式 (參考 image_32e5e3.png 改造相應結局區塊)
       ========================================================================== */
    :root {
      --current-theme: #4caf50;       
      --current-bg: #f5f7fa;          
      --current-light-theme: #fff9c4; 
      --current-text: #f57f17;        
      --border-color: #e0e0e0;
    }

    .modal-overlay {
      display: none; 
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      z-index: 999;
      justify-content: center; 
      align-items: center;
      padding: 20px; 
      box-sizing: border-box;
    }

    .result-card {
      background-color: #ffffff;
      width: 100%;
      max-width: 420px; 
      aspect-ratio: 9 / 16;
      max-height: 85vh; 
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px;
      border: 3px solid var(--current-theme); 
      box-sizing: border-box;
      animation: modalFadeIn 0.3s ease;
    }

    @keyframes modalFadeIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .header-section {
      display: flex;
      border: 2px dashed var(--border-color);
      border-radius: 8px;
      height: 76px;
      overflow: hidden;
      flex-shrink: 0; 
    }
    .header-name {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      background-color: var(--current-bg);
      border-right: 2px dashed var(--border-color);
      color: #333;
      padding: 10px 12px;
      position: relative;
      overflow: hidden;
    }
    .header-ending-title {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      line-height: 1.2;
      margin-bottom: 4px;
      width: 100%;
      text-align: center;
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-60%);
      padding: 0 8px;
      box-sizing: border-box;
    }
    .header-role-name {
      font-size: 11px;
      color: var(--current-text);
      font-weight: normal;
      position: relative;
      z-index: 1;
    }
    .header-image {
      width: 76px;
      height: 76px;
      flex-shrink: 0;        /* 🚀 關鍵：防止正方形被 flex 壓縮變形 */
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f0f0;
      overflow: hidden;
    }
    .header-image img { width: 100%; height: 100%; object-fit: cover; }

    /* 調整內容區塊權重，使其在 9:16 下有更好的伸縮性 */
    .content-section { 
      display: flex; 
      gap: 10px;
      align-items: stretch;
      flex: 1;
      min-height: 0;
    }
    
    .tags-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 5px;
      min-width: 0;
    }
    .tag-item {
      background-color: var(--current-theme); 
      color: white;
      padding: 5px 7px;
      border-radius: 20px;
      text-align: center;
      font-size: 10.5px;
      font-weight: 500;
    }

    .text-section {
      flex: 2.2; 
      border: 2px solid var(--border-color);
      border-radius: 8px;
      padding: 10px;
      overflow-y: auto; 
      background-color: #ffffff;
      color: #444;
      font-size: 12.5px;
      line-height: 1.6;
      white-space: pre-line; 
      box-sizing: border-box;
    }

    .text-section::-webkit-scrollbar { width: 5px; }
    .text-section::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 3px; }

    .corresponding-wrapper {
      display: flex;
      flex-direction: column;
      border: 2px solid #222222; 
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 1;
      min-height: 0;
    }
    
    .corresponding-header {
      background-color: #111111; 
      color: #ffffff;
      text-align: center;
      padding: 5px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .corresponding-body {
      background-color: #ffffff;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 1;
      min-height: 0;
    }

    .sub-ending-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      width: 76px;
      flex-shrink: 0;
    }

    .sub-ending-img-box {
      width: 64px;
      height: 64px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
      background: #f9f9f9;
      margin-bottom: 4px;
    }
    .sub-ending-img-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .sub-ending-img-box.sub-locked img {
      filter: grayscale(100%) blur(2px);
      opacity: 0.4;
    }

    .sub-ending-name {
      display: none;
    }

    .hint-box {
      flex-shrink: 0 !important;
      border: 2px dotted var(--current-theme);
      border-radius: 8px;
      background-color: #fafafa;
      color: var(--current-theme);
      font-size: 10.5px;
      font-weight: 500;
      text-align: center;
      padding: 6px 10px;
      line-height: 1.4;
    }

    /* 底部三按鈕同一排 */
    .buttons-row-only {
      display: flex;
      gap: 6px;
      flex-shrink: 0 !important;
    }
    .template-btn { flex: 1; padding: 0 4px; height: 38px; border: none; border-radius: 8px; font-size: 11.5px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; white-space: nowrap; }
    .btn-share  { background-color: #ff9800; color: white; }
    .btn-replay { background-color: #e0e0e0; color: #333; }
    .btn-close  { background-color: var(--current-theme); color: white; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/dom-to-image-more@3.4.1/dist/dom-to-image-more.min.js"></script>
</head>

    });

    function updateLanguageElements(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-zh]').forEach(el => {
        el.innerHTML = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');
      });

      const titleEl = document.querySelector('.wall-title');
      titleEl.innerText = lang === 'zh' ? `🏆 結局收集牆 (${unlockCount}/20)` : `🏆 Endings Wall (${unlockCount}/20)`;

      achievements.forEach(ach => {
        const isUnlocked = localStorage.getItem(ach.key) === 'true';
        const cardEl = document.getElementById(ach.cardId);
        const textEl = document.getElementById(ach.textId);
        if (cardEl && textEl) {
          if (isUnlocked) {
            cardEl.classList.remove('locked');
            textEl.innerText = ach.name[lang];
          } else {
            textEl.innerText = lang === 'zh' ? '？？？' : '???';
          }
        }
      });

      if (currentActiveAch && document.getElementById('resultModal').style.display === 'flex') {
        renderModalContent(currentActiveAch, lang);
      }
    }

    function renderModalContent(achData, lang) {
      const imgPath = `../../public/results/${achData.cardId.replace('card_', '').replace('_', '-')}.png`;
      const s = achData.styles;

      const root = document.documentElement;
      root.style.setProperty('--current-theme', s.theme);
      root.style.setProperty('--current-bg', s.bg);
      root.style.setProperty('--current-light-theme', s.lightBg);
      root.style.setProperty('--current-text', s.text);

      document.getElementById('modalRoleName').innerText = achData.role[lang];
      document.getElementById('modalEndingName').innerText = achData.name[lang];
      document.getElementById('modalMainImgBox').innerHTML = `<img src="${imgPath}" alt="${achData.name[lang]}">`;

      const tagsContainer = document.getElementById('modalTagsContainer');
      tagsContainer.innerHTML = '';
      achData.tags[lang].forEach(tag => {
        const tagDiv = document.createElement('div');
        tagDiv.className = 'tag-item';
        tagDiv.innerText = tag;
        tagsContainer.appendChild(tagDiv);
      });

      // 上方框框只呈現純結局故事
      document.getElementById('modalDescription').innerText = achData.desc[lang];
      document.getElementById('modalHintBox').innerText = achData.hint[lang];

      // 動態渲染下方的相應結局 (重現 image_32e5e3.png)
      const correspondingBody = document.getElementById('modalCorrespondingBody');
      correspondingBody.innerHTML = '';

      if (!achData.correspondingIds || achData.correspondingIds.length === 0) {
        correspondingBody.innerHTML = `<div style="font-size:12px; color:#999; padding: 10px;">${lang === 'zh' ? '無特殊相應結局' : 'No specific corresponding endings.'}</div>`;
      } else {
        achData.correspondingIds.forEach(targetKey => {
          const targetAch = achievements.find(a => a.key === targetKey);
          if (targetAch) {
            const isTargetUnlocked = localStorage.getItem(targetAch.key) === 'true';
            const targetImgPath = `../../public/results/${targetAch.cardId.replace('card_', '').replace('_', '-')}.png`;
            // 建立單個元件
            const itemDiv = document.createElement('div');
            itemDiv.className = 'sub-ending-item';

            // 圖片框
            const imgBox = document.createElement('div');
            imgBox.className = 'sub-ending-img-box';
            if (!isTargetUnlocked) imgBox.classList.add('sub-locked');
            imgBox.innerHTML = `<img src="${targetImgPath}" alt="sub">`;

            // 名字
            const nameSpan = document.createElement('span');
            nameSpan.className = 'sub-ending-name';
            nameSpan.innerText = isTargetUnlocked ? targetAch.name[lang] : (lang === 'zh' ? '？？？' : '???');

            itemDiv.appendChild(imgBox);
            itemDiv.appendChild(nameSpan);
            correspondingBody.appendChild(itemDiv);
          }
        });
      }
    }

    function openResultModal(achData) {
      currentActiveAch = achData;
      renderModalContent(achData, currentLang);
      document.getElementById('resultModal').style.display = 'flex';
    }

    window.addEventListener('DOMContentLoaded', () => {
      const lastPage = localStorage.getItem('currentGamePage') || '../index.html';
      document.getElementById('backToGameBtn').href = lastPage;

      achievements.forEach(ach => {
        const isUnlocked = localStorage.getItem(ach.key) === 'true';
        const cardEl = document.getElementById(ach.cardId);
        if (isUnlocked && cardEl) {
          cardEl.addEventListener('click', () => openResultModal(ach));
        }
      });

      updateLanguageElements('zh');
      window.addEventListener('languageChanged', (e) => updateLanguageElements(e.detail.lang));

      const modal = document.getElementById('resultModal');

      function closeModal() {
        modal.style.display = 'none';
        currentActiveAch = null;
        // 每次關閉彈窗都確保按鈕列復原
        const buttonsRow = document.querySelector('.buttons-row-only');
        if (buttonsRow) buttonsRow.style.visibility = 'visible';
        // 重置下載按鈕狀態
        const shareBtn = document.getElementById('modalShareBtn');
        if (shareBtn) {
          shareBtn.disabled = false;
          shareBtn.textContent = currentLang === 'zh'
            ? shareBtn.getAttribute('data-zh')
            : shareBtn.getAttribute('data-en');
        }
      }

      document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
      modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
      
      document.getElementById('modalReplayBtn').addEventListener('click', () => {
        window.location.href = '../index.html';
      });

      // 「下載結果」按鈕：手機用 Share API（可直傳 IG/LINE），電腦直接下載圖片
      document.getElementById('modalShareBtn').addEventListener('click', async () => {
        if (!currentActiveAch) return;

        const btn = document.getElementById('modalShareBtn');
        const card = document.querySelector('.result-card');
        const buttonsRow = document.querySelector('.buttons-row-only');
        const origText = btn.textContent;

        // 鎖住按鈕、隱藏按鈕列
        btn.textContent = currentLang === 'zh' ? '產生中…' : 'Generating…';
        btn.disabled = true;
        buttonsRow.style.visibility = 'hidden'; // 用 visibility 隱藏，不影響 layout，也不需要還原 display

        try {
          // 截圖（不需要動圖片 src，直接截）
          const scale = 3;
          const w = card.offsetWidth;
          const h = card.offsetHeight;
          const dataUrl = await domtoimage.toPng(card, {
            width: w * scale,
            height: h * scale,
            style: {
              transform: `scale(${scale})`,
              transformOrigin: 'top left',
              width: w + 'px',
              height: h + 'px',
            }
          });

          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const roleName = currentActiveAch.role[currentLang].replace(/\s+/g, '_');
          const endingName = currentActiveAch.name[currentLang].replace(/\s+/g, '_');
          const fileName = `NoFold_${roleName}_${endingName}.png`;
          const file = new File([blob], fileName, { type: 'image/png' });

          // 手機：用 Share API 直接分享圖片
          if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
            const shareText = currentLang === 'zh'
              ? `我在《NoFold》解鎖了結局【${currentActiveAch.role.zh} - ${currentActiveAch.name.zh}】！`
              : `I unlocked the ending [${currentActiveAch.role.en} - ${currentActiveAch.name.en}] in NoFold!`;
            await navigator.share({ files: [file], title: 'NoFold', text: shareText });
          } else {
            // 電腦：直接下載圖片
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = fileName;
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);
          }
        } catch (err) {
          if (err.name !== 'AbortError') {
            console.error('失敗:', err);
            alert(currentLang === 'zh' ? '下載失敗，請截圖儲存。' : 'Failed. Please screenshot manually.');
          }
        } finally {
          buttonsRow.style.visibility = 'visible';
          btn.textContent = currentLang === 'zh'
            ? btn.getAttribute('data-zh')
            : btn.getAttribute('data-en');
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
