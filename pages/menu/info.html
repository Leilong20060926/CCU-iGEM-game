  <style>
    .image-relative-wrapper {
      border: 2px solid #000;
      background: #fcfcfc;
      box-sizing: border-box;
    }

    .story-text-box {
      position: relative !important;
      top: auto !important;
      left: auto !important;
      width: 100% !important;
      height: 100% !important;
      max-height: 100vh !important;
      background: #fcfcfc !important;
      color: #333333 !important;
      padding: 25px !important;
      box-sizing: border-box !important;
      overflow-y: auto !important;
      z-index: 10 !important;
      float: none !important;
      display: block !important;
      margin: 0 !important;
      transform: none !important;
      bottom: auto !important;
      right: auto !important;
    }

    #storyText {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
      padding: 0 !important;
      margin: 0 !important;
    }

    .news-title {
      font-size: 16pt;
      font-weight: bold;
      color: #000000;
      margin-top: 25px;
      margin-bottom: 15px;
      padding-bottom: 4px;
      display: inline-block;
      border-bottom: 4px solid #ffcc00;
    }

    .news-title:first-child {
      margin-top: 5px;
    }

    .news-body {
      font-size: 11pt;
      line-height: 1.8;
      color: #333333;
      margin-bottom: 20px;
      text-align: left;
    }

    /* 連結按鈕區 */
    .link-buttons {
      display: flex;
      flex-direction: row;
      gap: 14px;
      margin-top: 10px;
      margin-bottom: 20px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: #FFEE91;
      border: 1px solid #000;
      border-radius: 18px;
      cursor: pointer;
      text-decoration: none;
      color: #000000;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .link-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 30px rgba(0,0,0,0.14);
      background: #ffe666;
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn img {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
  </style>
</head>

          <div class="news-title" data-zh="簡介" data-en="About Us">簡介</div>
          <p class="news-body" data-zh="我們是 No Fold，CCU-Taiwan iGEM 團隊，由國立中正大學各學院的學生所組成，涵蓋理學院、工學院、社會科學院、文學院，以及跨領域學士學位學程的同學。" data-en="We are No Fold, the CCU-Taiwan iGEM team, composed of students from various colleges at National Chung Cheng University, including the College of Science, College of Engineering, College of Social Sciences, College of Humanities, and the Interdisciplinary Bachelor's Degree Program.">我們是 No Fold，CCU-Taiwan iGEM 團隊，由國立中正大學各學院的學生所組成，涵蓋理學院、工學院、社會科學院、文學院，以及跨領域學士學位學程的同學。</p>
          <p class="news-body" data-zh="我們團隊計畫利用生物合成學的方式，開發可用於驅趕農業害蟲瘤野螟的系統，希望大家了解農藥對世界的危害以及增進大眾對有機稻米的認知。" data-en="Our team plans to use synthetic biology to develop a system that can repel the agricultural pest striped rice borer. We hope to raise awareness about the harm pesticides cause to the world and promote public understanding of organic rice.">我們團隊計畫利用生物合成學的方式，開發可用於驅趕農業害蟲瘤野螟的系統，希望大家了解農藥對世界的危害以及增進大眾對有機稻米的認知。</p>
