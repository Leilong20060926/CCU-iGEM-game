  <script>
    /* ==========================================================================
       1. 乒乓循環動畫邏輯 (背景持續播放)
       ========================================================================== */
    const animationFrames = [
      '../../public/animation/a2-1.png',
      '../../public/animation/a2-2.png',
      '../../public/animation/a2-3.png',
      '../../public/animation/a2-4.png',
      '../../public/animation/a2-5.png',
      '../../public/animation/a2-6.png',
      '../../public/animation/a2-7.png',
      '../../public/animation/a2-8.png',
      '../../public/animation/a2-9.png',
      '../../public/animation/a2-10.png'
    ];

let currentFrameIndex = 0;
const animImageElement = document.getElementById('animationImage');

function playLoopAnimation() {
  currentFrameIndex = (currentFrameIndex + 1) % animationFrames.length;
  animImageElement.src = animationFrames[currentFrameIndex];
}

const gamePage17AnimationTimer = setInterval(playLoopAnimation, 250);


    /* ==========================================================================
       2. 多語言在地化文本數據 (多段純文字台詞)
       ========================================================================== */
    const localDialogueData = {
      zh: {
        text: [
          '農藥。',
          '研究指出，長期生活在農藥頻繁噴灑區域附近的人，或長時間接觸農藥的人，罹患癌症的風險會明顯提高。',
          '不僅如此，農藥還會導致蜂后數量減少85%，殺死蜜蜂等重要的授粉昆蟲，危害樹蛙等瀕危物種，甚至破壞土壤肥力，使土地失去原本的生命力。',
          '聯合國糧農組織警告說，如果這樣的情況持續下去，未來我們面對的，將不只是環境問題，更可能是糧食短缺與生態崩潰。'
        ]
      },
      en: {
        text: [
          'Pesticides.',
          'Studies have shown that people who live near areas with frequent pesticide spraying, or those who are regularly exposed to pesticides over long periods, face a significantly higher risk of developing cancer.',
          'In addition, pesticides have been found to reduce queen bee populations by up to 85%, kill essential pollinators such as bees, threaten endangered species like tree frogs, and even degrade soil fertility, stripping the land of its natural vitality.',
          'The Food and Agriculture Organization of the United Nations has warned that if this situation continues, what we may face in the future is not only an environmental crisis, but also potential food shortages and ecological collapse.'
        ]
      }
    };

    let textParts = [];
    let currentPart = 0;
    let currentLang = 'zh';
    let typewriterTimer = null;

    const arrow = document.querySelector('.story-text-arrow');
    const storyTextEl = document.getElementById('storyText');

    // 播放下一段台詞的函式
    function showNextPart() {
        if (typewriterTimer) clearInterval(typewriterTimer);
  if (storyTextEl && currentPart < textParts.length) {
    storyTextEl.innerHTML = '';
    
    const onDone = () => {
      arrow.classList.add('show'); // 打字機打完才顯示箭頭
    };

    if (typeof startTypewriter === 'function') {
      startTypewriter(textParts[currentPart], { onComplete: onDone });
    } else if (typeof TypewriterEffect !== 'undefined') {
      const typewriter = new TypewriterEffect();
      typewriter.start(textParts[currentPart], onDone);
    } else {
      storyTextEl.innerText = textParts[currentPart];
      onDone();
    }
    currentPart++;
}
    }

    // 根據目前語言初始化或更新故事內容
    function renderStory(lang) {
      currentLang = lang;
      const data = localDialogueData[lang] || localDialogueData['zh'];
      textParts = data.text;
      currentPart = 0; // 切換語言時從頭播放
      showNextPart();
    }

    // 監聽全域語言切換事件
    window.addEventListener('languageChanged', (event) => {
      renderStory(event.detail.lang);
    });

    // 網頁載入時自動初始化
    window.addEventListener('load', () => {
      renderStory(currentLang);
    });

    // 監聽箭頭（三角形）點擊事件
    if (arrow) {
      arrow.addEventListener('click', (e) => {
  e.preventDefault();
  arrow.classList.remove('show'); // 先隱藏，防止連點

  if (currentPart < textParts.length) {
    showNextPart(); // 內部完成後會再 show 回來
  } else {
    window.location.href = 'a3.html';
  }
      });
    }
  </script>
