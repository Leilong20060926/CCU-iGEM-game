    .game-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      width: 100%;
      height: 100%;
    }
    .image-relative-wrapper {
      position: relative;
      display: inline-block;
      width: calc(100% - 1002px);
      min-width: 270px;
      max-width: 100vw;
      max-height: 100vh;
      margin: auto;
    }
    .game-image {
      display: block;
      width: 100%;
      height: auto;
      border: 2px solid #000;
      transition: filter 0.3s ease;
    }
    .story-text-box {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      min-height: 110px;
      box-sizing: border-box;
      z-index: 50;
      overflow: visible;
      transition: filter 0.3s ease, opacity 0.3s ease;
      background: rgba(45, 82, 119, 0.85);
      color: white;
      border-radius: 10px;
      padding: 16px 20px 20px;
      font-size: 1rem;
      line-height: 1.6;
      text-align: left;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      cursor: pointer;
      user-select: none;
    }
    .story-text-box:hover {
      background: rgba(55, 95, 135, 0.92);
    }
    .story-text-box.blur {
      filter: blur(5px);
      opacity: 0.5;
      pointer-events: none;
    }
    .scene-dialogue .story-text-box {
      background: rgba(83, 164, 207, 0.92);
      color: white;
      border-radius: 15px;
      bottom: 25px;
      width: 85%;
      min-height: 110px;
      padding: 12px 18px;
    }
    .scene-dialogue .story-text-box:hover {
      background: rgba(95, 178, 220, 0.95);
    }
    .scene-dialogue .story-text-box::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 25px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 0 solid transparent;
      border-bottom: 12px solid rgba(83, 164, 207, 0.92);
    }
    .character-name {
      background: rgba(45, 99, 160, 0.92);
      color: white;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .character-name.hidden { display: none; }
    .story-text { margin: 0; }
    .story-text-arrow {
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-top: 10px solid rgba(255,255,255,0.8);
      margin: 12px auto 0;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      display: block;
      pointer-events: none;
    }
    .story-text-arrow.show { opacity: 1; }
    .choices-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 420px;
      border-radius: 15px;
      padding: 40px 30px;
      z-index: 2000;
      background: rgba(35, 65, 95, 0.95);

      text-align: center;
      margin-bottom: 20px;

  const Stats = {

    // 健康 > 0 且 壓力 < 100 才算正常狀態
    isHealthy() { return this.health > 0 && this.stress < 100; },

    rollBadEnding() {
      const r = Math.random();
      if (r < 0.20) return 'bad2';   // 20%
      if (r < 0.60) return 'bad3';   // 40%
      return 'bad4';                  // 40%
    },

    harvestEnding() {
      if (this.reputation < -50) return 'bad2';
      if (this.reputation > 100) return 'good1';
      return 'good2';

  };

  //  打字機
  // ════════════════════════════════════════════
  let globalTypewriterTimer = null;
  let isTyping = false;

  function runTypewriter(el, text, arrowEl, onComplete) {
    if (!el) return;
    if (!text) { if (arrowEl) arrowEl.classList.add('show'); if (onComplete) onComplete(); return; }
    if (globalTypewriterTimer) { clearTimeout(globalTypewriterTimer); globalTypewriterTimer = null; }
    el.textContent = '';
    let i = 0;
    isTyping = true;
    if (arrowEl) arrowEl.classList.remove('show');

    function type() {
      if (i < text.length) {
        el.textContent += text[i++];
        globalTypewriterTimer = setTimeout(type, 40);
      } else {
        globalTypewriterTimer = null;
        isTyping = false;
        if (arrowEl) arrowEl.classList.add('show');
        if (onComplete) onComplete();
      }
    }
    type();
  }

  function finishTypewriter(el, text, arrowEl) {
    if (globalTypewriterTimer) { clearTimeout(globalTypewriterTimer); globalTypewriterTimer = null; }
    if (el) el.textContent = text;
    isTyping = false;
    if (arrowEl) arrowEl.classList.add('show');
  }

        en: ['You say farewell on the edge of the field, offering them encouragement.', 'The wind passes through the waves of rice plants, and the field falls quiet once again.', 'But you know—some answers are still being slowly pieced together somewhere far away.']
      },
      next: () => { finishEnding('good3'); return null; }
    },

    // ── 壞1：金錢耗盡 ──
    'bad1': {
      image: '3-4.png', charName: null,
      texts: {
        zh: ['帳戶裡的數字終於歸零。', '借不到錢、賣不出稻米，這片田你再也撐不下去了。', '你只能黯然放棄這次的耕種。'],
        en: ['The number in your account finally hits zero.', 'Unable to borrow more or sell any rice, you cannot keep this field going any longer.', 'You have no choice but to give up this harvest.']
      },
      next: () => { finishEnding('bad1'); return null; }
    },

    // ── 壞2：操作條件失敗（隨機判定觸發版）──
    'bad2': {
      image: '2-5.png', charName: null,
      texts: {
        zh: ['你持續借錢擴張並大量使用農藥。', '田區開始被外部檢查介入。', '用藥紀錄與異常數據被放大檢視。', '最終，收成被封存，無法販售，信任中斷，一切停止。'],
        en: ['You keep borrowing money to grow bigger and use a large amount of pesticides.', 'Outside inspectors start to step into your fields.', 'Your spray records and strange data are put under a big magnifying glass.', 'In the end, your harvest is sealed away and cannot be sold. Trust is broken, and everything stops.']
      },
      next: () => { finishEnding('bad2'); return null; }
    },



    // ── 好2：平穩落幕（2-7.html）──
    'good2': {
      image: '2-7.png', charName: null,
      texts: {
        zh: ['收成與販售過程順利完成。', '未出現重大問題，也未有特別突出的成果。', '整體維持基本穩定。', '田地持續運作，資源得以延續至下一季。', '本季以平穩的狀態結束。'],
        en: ['The harvest and sales process are completed smoothly.', 'No major problems occur, but there are also no particularly outstanding results.', 'Overall, things remain basically stable.', 'The field continues to operate, and resources are carried over to the next season.', 'This season ends in a steady, uneventful state.']
      },
      next: () => { finishEnding('good2'); return null; }
    },

    // ── 好1：聲譽極高（2-8 → 2-8-c → 2-8-2）──
    // 'good1' 現在是多場景序列，先顯示 2-8 的敘述文字
    'good1_1': {
      image: '2-8.png', charName: null,
      texts: {
        zh: ['整體種植過程穩定，品質與管理受到肯定。', '產品順利通過市場檢驗，並獲得良好評價。', '收成後的產品不僅成功完成販售，也逐漸累積了市場信任，為下一季的合作與機會奠定基礎。'],
        en: ['The overall cultivation process remained stable, and both quality and management were well recognized.', 'The product successfully passed market inspections and received positive evaluations.', 'After harvest, the rice was not only successfully sold but also gradually built market trust, laying the foundation for future cooperation and opportunities.']
      },
      next: () => 'good1_c'
    },
    'good1_c': {
      image: '2-8.png', charName: { zh: '農民', en: 'Farmer' },
      texts: {
        zh: ['好欸，成功達成目標了！'],
        en: ['Yes, I did it—I reached my goal!']
      },
      next: () => 'good1_2'
    },
    'good1_2': {
      image: '2-8.png', charName: null,
      texts: {
        zh: ['最終，本季的表現被視為一次成功的種植案例。'],
        en: ['In the end, this season was regarded as a successful farming case study.']
      },
      next: () => { finishEnding('good1'); return null; }
    },



    // ── 壞3：身體崩壞，農藥長期暴露 ──
    'bad3': {
      image: '2-5.png', charName: null,
      texts: {
        zh: ['你持續借錢擴張並大量使用農藥。', '你的身體開始無法負荷長期壓力與化學暴露。'],
        en: ['You keep borrowing money to grow bigger and use a large amount of pesticides.', 'Your body begins to break down from the long-term stress and the chemicals.']
      },
      next: () => 'bad3_c'
    },
    'bad3_c': {
      image: '2-5.png', charName: { zh: '農民', en: 'Farmer' },
      texts: {
        zh: ['咳咳咳......'],
        en: ['Cough, cough, cough...']
      },
      next: () => 'bad3_2'
    },
    'bad3_2': {
      image: '2-5.png', charName: null,
      texts: {
        zh: ['田還在，但你已經無法長時間停留。'],
        en: ['The field is still there, but you can no longer stay in it for long.']
      },
      next: () => { finishEnding('bad3'); return null; }
    },

    // ── 壞4：生態崩壞（螟蟲擴散）──
    'bad4': {
      image: '2-6.png', charName: null,
      texts: {
        zh: ['你持續借錢擴張並大量使用農藥。', '螟蟲逐漸適應並擴散，田間失去控制。', '生態崩壞，產量與品質同步下滑。'],
        en: ['You keep borrowing money to grow bigger and use a large amount of pesticides.', 'The bugs slowly get used to the chemicals and spread, and the field goes out of control.', 'The nature around you breaks down, and both your harvest amount and its quality drop at the same time.']
      },
      next: () => { finishEnding('bad4'); return null; }
    }
  };

  // ════════════════════════════════════════════
  //  選擇框資料
  // ════════════════════════════════════════════
  const CHOICES = {
    period1: {
      title: { zh: '種植期一：請選擇你的種植方式：', en: 'Growth Stage 1: Choose your cultivation method:' },
      options: [
        { zh: '穩定種植', en: 'Stable Cultivation', action() { Stats.add('money',20); Stats.add('health',5); Stats.add('stress',-5); Stats.add('reputation',5); runScene('p1_stable'); } },
        { zh: '使用農藥', en: 'Use Pesticides', action() { Stats.add('money',60); Stats.add('health',-25); Stats.add('stress',20); Stats.add('reputation',-10); runScene('p1_pesticide'); } },
        { zh: '使用檸檬烯', en: 'Use Limonene', action() { Stats.add('money',20); Stats.add('health',5); Stats.add('stress',5); Stats.add('reputation',15); runScene('p1_limonene'); } },
        { zh: '借錢投資', en: 'Borrow Money for Investment', action() { Stats.add('money',100); Stats.add('stress',60); runScene('p1_borrow'); } },
        { zh: '休息', en: 'Rest', action() { Stats.add('health',20); Stats.add('stress',-20); Stats.add('money',-20); runScene('p1_rest'); } }
      ]
    },
    period2: {
      title: { zh: '種植期二：請選擇你的種植方式：', en: 'Growth Stage 2: Choose your cultivation method:' },
      options: [
        { zh: '穩定種植', en: 'Stable Cultivation', action() { Stats.add('money',20); Stats.add('health',5); Stats.add('stress',-5); Stats.add('reputation',5); runScene('p2_stable'); } },
        { zh: '使用農藥', en: 'Use Pesticides', action() { Stats.add('money',60); Stats.add('health',-25); Stats.add('stress',20); Stats.add('reputation',-10); runScene('p2_pesticide'); } },
        { zh: '借錢投資', en: 'Borrow Money for Investment', action() { Stats.add('money',100); Stats.add('stress',60); runScene('p2_borrow'); } },
        { zh: '休息', en: 'Rest', action() { Stats.add('health',20); Stats.add('stress',-20); Stats.add('money',-20); runScene('p2_rest'); } }
      ]
    },
    period3: {
      title: { zh: '種植期三：請選擇你的種植方式：', en: 'Growth Stage 3: Choose your cultivation method:' },
      options: [
        { zh: '穩定種植', en: 'Stable Cultivation', action() { Stats.add('money',20); Stats.add('health',5); Stats.add('stress',-5); Stats.add('reputation',5); runScene('p3_stable'); } },
        { zh: '使用檸檬烯', en: 'Use Limonene', action() { Stats.add('money',20); Stats.add('health',5); Stats.add('stress',5); Stats.add('reputation',15); runScene('p3_limonene'); } },
        { zh: '借錢投資', en: 'Borrow Money for Investment', action() { Stats.add('money',100); Stats.add('stress',60); runScene('p3_borrow'); } },
        { zh: '休息', en: 'Rest', action() { Stats.add('health',20); Stats.add('stress',-20); Stats.add('money',-20); runScene('p3_rest'); } }
      ]
    }
  };

  // ════════════════════════════════════════════
  //  種植期共用判斷邏輯
  // ════════════════════════════════════════════
  // 留在原本的期數（穩定種植 / 借錢投資 / 休息 都會留在原期數迴圈）
  function afterChoice(periodKey) {
    return afterChoicePeriodLock(periodKey, periodKey);
  }

  // 可能轉換到下一個期數（農藥 -> 種植期二，檸檬烯 -> 種植期三）
  function afterChoicePeriodLock(currentPeriodKey, nextPeriodKey) {
    updateHud();
    saveStats();

    if (Stats.money <= 0) return 'bad1';
    if (!Stats.isHealthy()) return Stats.rollBadEnding();
    if (Stats.money >= 300) return 's_harvest_start';

    goChoice(nextPeriodKey);
    return null;
  }

  // 種植期1選擇「使用農藥」或「使用檸檬烯」專用：
  // 在正常的金錢/健康/壓力判定之後，額外有 50% 機率提早觸發隱藏的好3結局（IGEM協作支線）
  function afterChoicePeriodLockOrShortcut(currentPeriodKey, nextPeriodKey) {
    updateHud();
    saveStats();

    if (Stats.money <= 0) return 'bad1';
    if (!Stats.isHealthy()) return Stats.rollBadEnding();
    if (Stats.money >= 300) return 's_harvest_start';

    if (!localStorage.getItem('farmer_good3') && Math.random() < 0.5) {
      localStorage.setItem('farmer_good3', 'true');
      return 'g3_1';
    }

    goChoice(nextPeriodKey);
    return null;
  }

  // ════════════════════════════════════════════
  //  場景狀態
  // ════════════════════════════════════════════
  let currentScene     = null;
  let currentTexts     = [];
  let currentPart      = 0;
  let currentChoiceKey = null;

  // ════════════════════════════════════════════
  //  進度保存與還原
  // ════════════════════════════════════════════
  const STATS_STORAGE_KEY = 'farmer_game_stats';

  function saveStats() {
    localStorage.setItem(STATS_STORAGE_KEY, JSON.stringify({
      money: Stats.money,
      health: Stats.health,
      stress: Stats.stress,
      reputation: Stats.reputation,
      finalEnding: finalEnding
    }));
  }

  function loadStats() {
    try {
      const raw = localStorage.getItem(STATS_STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  function saveProgress(sceneKey, choiceKey) {
    const baseUrl = window.location.href.split('#')[0];
    const hash = choiceKey ? (sceneKey + '|' + choiceKey) : sceneKey;
    localStorage.setItem('currentGamePage', baseUrl + '#' + hash);
    saveStats();
  }

  function renderSceneInstant(sceneKey) {
    const scene = SCENES[sceneKey];
    if (!scene) return false;

    currentScene = sceneKey;
    currentTexts = scene.texts[lang] || scene.texts['zh'];
    currentPart  = currentTexts.length;

    gameImageEl.src = `../../public/pictures/${scene.image}`;

    if (scene.charName) {
      charNameEl.classList.remove('hidden');
      charNameEl.innerText = lang === 'en' ? scene.charName.en : scene.charName.zh;
      sceneWrapper.classList.add('scene-dialogue');
    } else {
      charNameEl.classList.add('hidden');
      sceneWrapper.classList.remove('scene-dialogue');
    }

    storyTextBox.classList.remove('blur');
    gameImageEl.style.filter = '';
    finishTypewriter(storyTextEl, currentTexts[currentTexts.length - 1], arrow);
    updateHud();
    return true;
  }

  // ════════════════════════════════════════════
  //  runScene
  // ════════════════════════════════════════════
  function runScene(sceneKey) {
    const scene = SCENES[sceneKey];
    if (!scene) return;

    currentScene = sceneKey;
    currentPart  = 0;
    currentTexts = scene.texts[lang] || scene.texts['zh'];

    gameImageEl.src = `../../public/pictures/${scene.image}`;

    if (scene.charName) {
      charNameEl.classList.remove('hidden');
      charNameEl.innerText = lang === 'en' ? scene.charName.en : scene.charName.zh;
      sceneWrapper.classList.add('scene-dialogue');
    } else {
      charNameEl.classList.add('hidden');
      sceneWrapper.classList.remove('scene-dialogue');
    }

    choicesBox.classList.remove('show');
    storyTextBox.classList.remove('blur');
    gameImageEl.style.filter = '';
    currentChoiceKey = null;

    saveProgress(sceneKey, null);
    updateHud();

    // 按鈕場景：隱藏文字框，顯示圖片疊加按鈕
    if (scene.buttonScene) {
      storyTextBox.style.display = 'none';
      overlayBtn.classList.remove('hidden');
      overlayBtn.onclick = () => {
        overlayBtn.classList.add('hidden');
        storyTextBox.style.display = '';
        const nextKey = scene.next();
        if (nextKey) runScene(nextKey);
      };
      return;
    }

    // 一般場景：確保按鈕隱藏、文字框顯示
    overlayBtn.classList.add('hidden');
    storyTextBox.style.display = '';

    showNextLine();
  }

  // ════════════════════════════════════════════
  //  showNextLine
  // ════════════════════════════════════════════
  function showNextLine() {
    if (currentPart < currentTexts.length) {
      const text = currentTexts[currentPart++];
      runTypewriter(storyTextEl, text, arrow, null);
    } else {
      const scene = SCENES[currentScene];
      const nextKey = scene.next();
      if (nextKey) runScene(nextKey);
    }
  }

  storyTextBox.addEventListener('click', () => {
    if (choicesBox.classList.contains('show')) return;
    showNextLine();
  });

  // ════════════════════════════════════════════
  //  選擇框
  // ════════════════════════════════════════════
  function goChoice(choiceKey) {
    const data = CHOICES[choiceKey];
    if (!data) return;

    currentChoiceKey = choiceKey;
    saveProgress(currentScene, choiceKey);

    choicesBox.classList.add('show');
    storyTextBox.classList.add('blur');
    gameImageEl.style.filter = 'blur(8px)';
    arrow.classList.remove('show');

    choicesTitle.innerText = data.title[lang] || data.title['zh'];

    choicesList.innerHTML = '';
    data.options.forEach(opt => {
      const li  = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'choice-button';
      btn.innerText = lang === 'en' ? opt.en : opt.zh;
      btn.addEventListener('click', () => opt.action());
      li.appendChild(btn);
      choicesList.appendChild(li);
    });
  }

  // ════════════════════════════════════════════
  //  結局
  // ════════════════════════════════════════════
  let finalEnding = null;

  function finishEnding(ending) {
    finalEnding = ending;
    localStorage.setItem('last_ending', ending);
    localStorage.setItem('farmer_' + ending, 'true');
    saveStats();
    window.location.href = '../menu/star.html';
  }

  // ════════════════════════════════════════════
  //  初始化
  // ════════════════════════════════════════════
  window.addEventListener('languageChanged', (e) => {
    lang = e.detail.lang;
    if (currentChoiceKey) {
      goChoice(currentChoiceKey);
    } else if (currentScene) {
      runScene(currentScene);
    }
    updateHud();
  });

  lang = localStorage.getItem('gameLanguage') || 'zh';

  (function startGame() {
    const hash = window.location.hash ? window.location.hash.substring(1) : '';
    const [resumeScene, resumeChoice] = hash ? hash.split('|') : [null, null];
    const saved = loadStats();

    if (resumeScene && SCENES[resumeScene] && saved) {
      Stats.money      = (typeof saved.money === 'number') ? saved.money : 50;
      Stats.health     = (typeof saved.health === 'number') ? saved.health : 50;
      Stats.stress     = (typeof saved.stress === 'number') ? saved.stress : 0;
      Stats.reputation = (typeof saved.reputation === 'number') ? saved.reputation : 0;
      finalEnding       = saved.finalEnding || null;

      if (resumeChoice && CHOICES[resumeChoice] && renderSceneInstant(resumeScene)) {
        goChoice(resumeChoice);
      } else {
        runScene(resumeScene);
      }
    } else {
      Stats.money = 50; Stats.health = 50; Stats.stress = 0; Stats.reputation = 0;
      finalEnding = null;
      runScene('s1');
    }
    updateHud();
  })();
  </script>
</body>
</html>
