<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1-s1</title>
  <link rel="stylesheet" href="../../public/css/shared.css" />
  <link rel="stylesheet" href="../../public/css/text-box.css" />
  <link rel="stylesheet" href="../../public/css/typewriter.css" />
  <style>
    .story-text-box {
      background: rgba(60, 100, 60, 0.85);
      color: white;
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li>
        <a href="../index.html" id="backToGameBtn">
          <img src="../../public/menu/left.svg" alt="" class="menu-icon"/>
          <span data-zh="回到遊戲" data-en="Back to Game">回到遊戲</span>
        </a>
      </li>
      <li>
        <a href="../menu/star.html">
          <img src="../../public/menu/star.svg" alt="" class="menu-icon"/>
          <span data-zh="收集結局" data-en="Endings">收集結局</span>
        </a>
      </li>
      <li>
        <a href="../menu/egg.html">
          <img src="../../public/menu/egg.svg" alt="" class="menu-icon"/>
          <span data-zh="遊戲彩蛋" data-en="Easter Eggs">遊戲彩蛋</span>
        </a>
      </li>
      <li>
        <a href="../menu/doc.html">
          <img src="../../public/menu/doc.svg" class="menu-icon"/>
          <span data-zh="相關資訊" data-en="Information">相關資訊</span>
        </a>
      </li>
      <li>
        <a href="../menu/info.html">
          <img src="../../public/menu/info.svg" alt="" class="menu-icon"/>
          <span data-zh="關於我們" data-en="About Us">關於我們</span>
        </a>
      </li>
    </ul>
  </nav>
  <div class="top-left-controls">
    <button class="btn" id="alignBtn" aria-label="Align left">
      <img id="alignIcon" src="../../public/menu/align-left.svg" alt="Align left" />
    </button>
  </div>
  <div class="controls">
    <button class="btn" id="musicBtn" aria-label="Toggle music">
      <img id="musicIcon" src="../../public/menu/music.svg" alt="Music" />
    </button>
    <button class="btn" id="langBtn" aria-label="Toggle language">
      <span id="langText">EN</span>
    </button>
  </div>
  <div class="game-container" id="gameContainer">
    <div class="image-relative-wrapper">
      <div class="story-text-box" id="storyTextBox">
        <div id="storyText" class="story-text"></div>
        <a href="1-s2-1.html" class="story-text-arrow"></a>
      </div>
      <img class="game-image" src="../../public/pictures/1-1.png" alt="1-1 scene" />
    </div>
  </div>

  <script src="../../public/js/shared-controls.js"></script>
  <script src="../../public/js/typewriter.js"></script>
  <script>
    const arrow = document.querySelector('.story-text-arrow');

    const localStoryData = {
      zh: [
        '當你完成產卵後，正準備離開葉片——',
        '空氣突然變得不對勁。',
        '不是農藥，也不是檸檬烯，是一種陌生、難以辨識的氣味。'
      ],
      en: [
        'Just as you finish laying your eggs and prepare to leave the leaf—',
        'The air suddenly feels different.',
        'It is not chemical pesticides, nor is it Limonene; it is an unfamiliar, unrecognizable scent.'
      ]
    };

    let textParts = [];
    let currentPart = 0;

    function showNextPart() {
      const storyTextEl = document.getElementById('storyText');
      if (storyTextEl && currentPart < textParts.length) {
        storyTextEl.innerHTML = '';
        if (typeof startTypewriter === 'function') {
          startTypewriter(textParts[currentPart], {
            onComplete: null
          });
        } else {
          storyTextEl.innerText = textParts[currentPart];
        }
        currentPart++;
      }
    }

    function renderStory(lang) {
      textParts = localStoryData[lang] || localStoryData['zh'];
      currentPart = 0;
      showNextPart();
    }

    window.addEventListener('languageChanged', (event) => {
      renderStory(event.detail.lang);
    });

    if (arrow) {
      arrow.addEventListener('click', (e) => {
        e.preventDefault();
        if (currentPart < textParts.length) {
          showNextPart();
        } else {
          window.location.href = '1-s2-1.html';
        }
      });
    }
  </script>
</body>
</html>
