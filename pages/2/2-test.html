  //  數值系統

  const Stats = {
    quality:       0,
    pestResist:   50,
    growth:        0,
    pesticideUsed: 0,

    add(key, val) { this[key] = (this[key] || 0) + val; },

    getEnding() {
      if (this.pestResist <= 0) return 'bad1';
      if (this.pesticideUsed >= 60) {
        const r = Math.random();
        if (r < 0.50) return 'bad2';   // 50% 壞2：無法販售
        if (r < 0.75) return 'bad3';   // 25% 壞3：蟲藥雙害
        return 'good1';                  // 25% 好1：隱藏風險
      }
      if (this.quality >= 100) return 'good2'; // 好2：田間典範
      return 'good3';                           // 好3：平穩落幕
    }
  };

  // ════════════════════════════════════════════
  //  打字機
  // ════════════════════════════════════════════
  let globalTypewriterTimer = null;
  let isTyping = false;

  function runTypewriter(el, text, arrowEl, onComplete) {
    if (!el) { console.error('runTypewriter: el is null, text=', text); return; }
    if (!text) { if (arrowEl) arrowEl.classList.add('show'); if (onComplete) onComplete(); return; }
    if (globalTypewriterTimer) { clearTimeout(globalTypewriterTimer); globalTypewriterTimer = null; }
    el.textContent = '';
    let i = 0;
    isTyping = true;
    if (arrowEl) arrowEl.classList.remove('show');

    function type() {
      if (i < text.length) {
        el.textContent += text[i++];
        globalTypewriterTimer = setTimeout(type, 40);
      } else {
        globalTypewriterTimer = null;
        isTyping = false;
        if (arrowEl) arrowEl.classList.add('show');
        if (onComplete) onComplete();
      }
    }
    type();
  }

  function finishTypewriter(el, text, arrowEl) {
    if (globalTypewriterTimer) { clearTimeout(globalTypewriterTimer); globalTypewriterTimer = null; }
    if (el) el.textContent = text;
    isTyping = false;
    if (arrowEl) arrowEl.classList.add('show');
  }

        en: ['You stayed in your best shape during the whole growing time.', 'Your heavy rice ears swing in the wind. Your leaves are healthy and whole, shining under the bright sun.']
      },
      next: () => 's9_dia'
    },
    's9_dia': {
      image: '2-9-c.png', charName: { zh: '稻米', en: 'Rice' },
      texts: {
        zh: ['大家快看我快看我！'],
        en: ['Everyone, Look at me!']
      },
      next: () => 's9_2'
    },
    's9_2': {
      image: '2-9.png', charName: null,
      texts: {
        zh: ['收成時，人們讚賞的聲音與欣慰的目光，落在你與整片稻田之上。', '你的存在，被人們認可。', '而你，也成為了這片田間最理想的典範。'],
        en: ['During harvest time, people look at you and the whole field with happy smiles and praise you.', 'People accept and love who you are.', 'And you become the most perfect example for this field.']
      },
      next: () => { finishEnding(); return null; }
    },

    // ── 好3：平穩落幕（圖 2-7）──
    's7_1': {
      image: '2-7.png', charName: null,
      texts: {
        zh: ['沒有遭遇極端的風險，也沒有留下特別耀眼的成果。', '你順利被收割、包裝，最後送往市場販售。', '沒有人特別記住你，卻也沒有任何人將你淘汰。', '這或許不是最亮眼的一年，但至少一切都平穩地落下了帷幕。'],
        en: ['You did not face any big dangers, but you also did not make anything amazing.', 'You are harvested, packed, and sent to the market to be sold without any trouble.', 'No one remembers you in a special way, but no one throws you away either.', 'This may not be the brightest year, but at least everything ends in a quiet, peaceful way.']
      },
      next: () => { finishEnding(); return null; }
    },

    // ── 隱藏支線（生長期1農藥/檸檬烯後觸發，圖 2-3 / 1-7 / 1-8）──
    'sp1': {
      image: '2-3.png', charName: null,
      texts: {
        zh: ['突然，你感受到異常的震動。', '你的部分組織，被人類帶離田間。'],
        en: ['Suddenly, you feel an unusual vibration.', 'A part of your tissue is taken away from the field by humans.']
      },
      next: () => 'sp2'
    },
    'sp2': {
      image: '1-7-1.png', animated: true, charName: { zh: '稻米', en: 'Rice' },
      texts: {
        zh: ['這….這是哪？', '怎麼沒有熟悉的泥土，也沒有原本的氣味？'],
        en: ['Where... where am I?', 'Why is there no familiar soil, and no original home?']
      },
      next: () => 'sp3'
    },
    'sp3': {
      image: '1-8.png', charName: null,
      texts: {
        zh: ['你被移植到另一個環境。'],
        en: ['You have been transplanted into a completely different environment.']
      },
      next: () => 'sp3_dia'
    },
    'sp3_dia': {
      image: '1-8.png', charName: { zh: '稻米', en: 'Rice' },
      texts: {
        zh: ['發生了什麼事…..？'],
        en: ['What just happened...?']
      },
      next: () => 'sp4'
    },
    'sp4': {
      image: '1-8.png', charName: null,
      texts: {
        zh: ['你的成長，已經不再屬於自然。'],
        en: ['Your growth no longer belongs to nature.']
      },
      next: () => {
        finalEnding = 'good4';
        finishEnding();
        return null;
      }
    }
  };

  // ════════════════════════════════════════════
  //  選擇框資料
  // ════════════════════════════════════════════
  const CHOICES = {
    choose1: {
      title: { zh: '請選擇你的生長方式：', en: 'Choose your growth strategy:' },
      options: [
        { zh: '穩定生長', en: 'Stable Growth', action() { Stats.add('quality',20); Stats.add('pestResist',-20); Stats.add('growth',20); if(Stats.pestResist<=0){triggerBad1();return;} runScene('story_stable1'); } },
        { zh: '使用農藥', en: 'Apply Pesticides', action() { Stats.add('pestResist',20); Stats.add('pesticideUsed',30); Stats.add('growth',20); tryTriggerSpecial('story_pest1', 'choose2'); } },
        { zh: '使用檸檬烯', en: 'Synthesize Limonene', action() { Stats.add('quality',20); Stats.add('pestResist',10); Stats.add('growth',10); tryTriggerSpecial('story_lim1_narr', 'choose3'); } }
      ]
    },
    choose2: {
      title: { zh: '請選擇你的生長方式：', en: 'Choose your growth strategy:' },
      options: [
        { zh: '穩定生長', en: 'Stable Growth', action() { Stats.add('quality',20); Stats.add('pestResist',-20); Stats.add('growth',20); if(Stats.pestResist<=0){triggerBad1();return;} runScene('story_stable2'); } },
        { zh: '使用十年前的農藥', en: 'Apply Pesticides from Ten Years Ago', action() { Stats.add('pestResist',20); Stats.add('pesticideUsed',30); Stats.add('growth',20); runScene('story_oldpest_dia'); } },
        { zh: '使用近期的農藥', en: 'Apply Modern-Day Pesticides', action() { Stats.add('pesticideUsed',30); Stats.add('growth',10); runScene('story_newpest'); } }
      ]
    },
    choose3: {
      title: { zh: '請選擇你的生長方式：', en: 'Choose your growth strategy:' },
      options: [
        { zh: '穩定生長', en: 'Stable Growth', action() { Stats.add('quality',20); Stats.add('pestResist',-20); Stats.add('growth',20); if(Stats.pestResist<=0){triggerBad1();return;} runScene('story_stable3'); } },
        { zh: '使用檸檬烯', en: 'Apply Limonene', action() { Stats.add('quality',20); Stats.add('pestResist',10); Stats.add('growth',10); runScene('story_lim2_narr'); } }
      ]
    }
  };

  // ════════════════════════════════════════════
  //  場景狀態
  // ════════════════════════════════════════════
  let currentScene     = null;
  let currentTexts     = [];
  let currentPart      = 0;
  let currentChoiceKey = null;
  let specialReturnChoice = null;  // special 結束後要回到哪個選擇框

  // 生長期1觸發 special 支線的共用函式
  // afterScene：special 結束後繼續播放的劇情場景，returnChoice：之後開啟的選擇框
  function tryTriggerSpecial(afterScene, returnChoice) {
    const unlocked = localStorage.getItem('rice_end_good4') === 'true';
    if (!unlocked && Math.random() < 0.5) {
      specialReturnChoice = returnChoice;
      runScene('sp1');
    } else {
      runScene(afterScene);
    }
  }

  // ════════════════════════════════════════════
  //  動畫（sp2 循跳動畫）
  // ════════════════════════════════════════════
  const SPECIAL_ANIM_FRAMES = [
    '../../public/pictures/1-7-1.png',
    '../../public/pictures/1-7-2.png',
    '../../public/pictures/1-7-3.png',
    '../../public/pictures/1-7-4.png',
    '../../public/pictures/1-7-5.png'
  ];
  let specialAnimTimer = null;

  function startSpecialAnimation() {
    stopSpecialAnimation();
    let frameIndex = 0;
    let direction  = 1;
    gameImageEl.src = SPECIAL_ANIM_FRAMES[0];
    specialAnimTimer = setInterval(() => {
      frameIndex += direction;
      if (frameIndex === SPECIAL_ANIM_FRAMES.length - 1) direction = -1;
      else if (frameIndex === 0) direction = 1;
      gameImageEl.src = SPECIAL_ANIM_FRAMES[frameIndex];
    }, 250);
  }

  function stopSpecialAnimation() {
    if (specialAnimTimer) { clearInterval(specialAnimTimer); specialAnimTimer = null; }
  }

  // ════════════════════════════════════════════
  //  進度保存與還原
  //  目的：讓側欄「回到遊戲」可以準確回到玩家正在進行的
  //  那一格場景（甚至是場景中彈出的選擇框），而不是回到固定的開頭。
  // ════════════════════════════════════════════
  const STATS_STORAGE_KEY = 'rice_game_stats';

  function saveStats() {
    localStorage.setItem(STATS_STORAGE_KEY, JSON.stringify({
      quality:       Stats.quality,
      pestResist:    Stats.pestResist,
      growth:        Stats.growth,
      pesticideUsed: Stats.pesticideUsed,
      finalEnding:   finalEnding
    }));
  }

  function loadStats() {
    try {
      const raw = localStorage.getItem(STATS_STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      return null;
    }
  }

  // sceneKey：目前播放中的劇情場景；choiceKey：若該場景正彈出選擇框則一併記錄
  function saveProgress(sceneKey, choiceKey) {
    const baseUrl = window.location.href.split('#')[0];
    const hash = choiceKey ? (sceneKey + '|' + choiceKey) : sceneKey;
    localStorage.setItem('currentGamePage', baseUrl + '#' + hash);
    saveStats();
  }

  // 還原時用：不跑打字機，直接把場景的最後畫面（圖片、文字、角色名）瞬間顯示出來，
  // 讓接下來要疊加的選擇框背景是正確的。
  function renderSceneInstant(sceneKey) {
    const scene = SCENES[sceneKey];
    if (!scene) return false;

    currentScene = sceneKey;
    currentTexts = scene.texts[lang] || scene.texts['zh'];
    currentPart  = currentTexts.length;

    stopSpecialAnimation();
    gameImageEl.src = `../../public/pictures/${scene.image}`;

    if (scene.charName) {
      charNameEl.classList.remove('hidden');
      charNameEl.innerText = lang === 'en' ? scene.charName.en : scene.charName.zh;
      sceneWrapper.classList.add('scene-dialogue');
    } else {
      charNameEl.classList.add('hidden');
      sceneWrapper.classList.remove('scene-dialogue');
    }

    storyTextBox.classList.remove('blur');
    gameImageEl.style.filter = '';
    finishTypewriter(storyTextEl, currentTexts[currentTexts.length - 1], arrow);
    return true;
  }

  // ════════════════════════════════════════════
  //  runScene
  // ════════════════════════════════════════════
  function runScene(sceneKey) {
    const scene = SCENES[sceneKey];
    if (!scene) return;

    currentScene = sceneKey;
    currentPart  = 0;
    currentTexts = scene.texts[lang] || scene.texts['zh'];

    stopSpecialAnimation();
    if (scene.animated) {
      startSpecialAnimation();
    } else {
      gameImageEl.src = `../../public/pictures/${scene.image}`;
    }

    if (scene.charName) {
      charNameEl.classList.remove('hidden');
      charNameEl.innerText = lang === 'en' ? scene.charName.en : scene.charName.zh;
      sceneWrapper.classList.add('scene-dialogue');
    } else {
      charNameEl.classList.add('hidden');
      sceneWrapper.classList.remove('scene-dialogue');
    }

    choicesBox.classList.remove('show');
    storyTextBox.classList.remove('blur');
    gameImageEl.style.filter = '';
    currentChoiceKey = null;

    saveProgress(sceneKey, null);

    showNextLine();
  }

  // ════════════════════════════════════════════
  //  showNextLine
  // ════════════════════════════════════════════
  function showNextLine() {
    if (currentPart < currentTexts.length) {
      const text = currentTexts[currentPart++];
      runTypewriter(storyTextEl, text, arrow, null);
    } else {
      const scene = SCENES[currentScene];
      const nextKey = scene.next();
      if (nextKey) runScene(nextKey);
    }
  }

  storyTextBox.addEventListener('click', () => {
    if (choicesBox.classList.contains('show')) return;
    showNextLine();
  });

  // ════════════════════════════════════════════
  //  選擇框
  // ════════════════════════════════════════════
  function goChoice(choiceKey) {
    if (Stats.pestResist <= 0) { triggerBad1(); return; }
    if (Stats.growth >= 100)   { beginSalePeriod(); return; }

    const data = CHOICES[choiceKey];
    if (!data) return;

    currentChoiceKey = choiceKey;
    saveProgress(currentScene, choiceKey);

    choicesBox.classList.add('show');
    storyTextBox.classList.add('blur');
    gameImageEl.style.filter = 'blur(8px)';
    arrow.classList.remove('show');

    choicesTitle.innerText = data.title[lang] || data.title['zh'];

    choicesList.innerHTML = '';
    data.options.forEach(opt => {
      const li  = document.createElement('li');
      const btn = document.createElement('button');
      btn.className = 'choice-button';
      btn.innerText = lang === 'en' ? opt.en : opt.zh;
      btn.addEventListener('click', () => opt.action());
      li.appendChild(btn);
      choicesList.appendChild(li);
    });
  }

  // ════════════════════════════════════════════
  //  結局
  // ════════════════════════════════════════════
  let finalEnding = null;

  function beginSalePeriod() {
    finalEnding = Stats.getEnding();
    runScene('s_sale1');
  }

  function triggerBad1() {
    finalEnding = 'bad1';
    runScene('s_bad1');
  }

  function finishEnding() {
    const ending = finalEnding;
    localStorage.setItem('last_ending', ending);
    // 每個結局都寫入收集記錄
    localStorage.setItem('rice_end_' + ending, 'true');

    // 結局播完後，一律導向「收集結局」頁面
    window.location.href = '../menu/star.html';
  }

  // ════════════════════════════════════════════
  //  初始化
  // ════════════════════════════════════════════
  window.addEventListener('languageChanged', (e) => {
    lang = e.detail.lang;
    if (currentChoiceKey) {
      goChoice(currentChoiceKey);
    } else if (currentScene) {
      runScene(currentScene);
    }
  });

  lang = localStorage.getItem('gameLanguage') || 'zh';

  // 嘗試從網址 hash 還原進度（格式：#場景key 或 #場景key|選擇框key）
  (function startGame() {
    const hash = window.location.hash ? window.location.hash.substring(1) : '';
    const [resumeScene, resumeChoice] = hash ? hash.split('|') : [null, null];
    const saved = loadStats();

    if (resumeScene && SCENES[resumeScene] && saved) {
      // 還原數值，玩家不會因為離開頁面再回來而被重設
      Stats.quality       = saved.quality       || 0;
      Stats.pestResist     = (typeof saved.pestResist === 'number') ? saved.pestResist : 50;
      Stats.growth         = saved.growth         || 0;
      Stats.pesticideUsed  = saved.pesticideUsed  || 0;
      finalEnding           = saved.finalEnding   || null;

      if (resumeChoice && CHOICES[resumeChoice] && renderSceneInstant(resumeScene)) {
        goChoice(resumeChoice);
      } else {
        runScene(resumeScene);
      }
    } else {
      // 沒有可還原的進度，從頭開始一輪新的遊戲
      Stats.quality = 0; Stats.pestResist = 50; Stats.growth = 0; Stats.pesticideUsed = 0;
      finalEnding = null;
      runScene('s1');
    }
  })();
  </script>
</body>
</html>
