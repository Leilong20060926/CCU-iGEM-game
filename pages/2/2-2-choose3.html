<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2-2-choose 選擇</title>
  <link rel="stylesheet" href="../../public/css/shared.css" />
  <link rel="stylesheet" href="../../public/css/text-box.css" />
  <link rel="stylesheet" href="../../public/css/choices-box.css" />
  <style>

    .story-text-box.blur {
      filter: blur(5px);
      opacity: 0.5;
    }

    .story-text-box {
      background: rgba(127, 108, 54, 0.92);
      color: white;
    }

    .choices-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      background: rgba(127, 108, 54, 0.95);
      color: white;
    }

    .choice-button {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
      color: white;
    }

    .choice-button:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .choice-button:active {
      background: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li>
        <a href="../index.html" id="backToGameBtn">
          <img src="../../public/menu/left.svg" alt="" class="menu-icon"/>
          <span data-zh="回到遊戲" data-en="Back to Game">回到遊戲</span>
        </a>
      </li>
      <li>
        <a href="../menu/star.html">
          <img src="../../public/menu/star.svg" alt="" class="menu-icon"/>
          <span data-zh="收集結局" data-en="Endings">收集結局</span>
        </a>
      </li>
      <li>
        <a href="../menu/egg.html">
          <img src="../../public/menu/egg.svg" alt="" class="menu-icon"/>
          <span data-zh="遊戲彩蛋" data-en="Easter Eggs">遊戲彩蛋</span>
        </a>
      </li>
      <li>
        <a href="../menu/doc.html">
          <img src="../../public/menu/doc.svg" class="menu-icon"/>
          <span data-zh="相關資訊" data-en="Information">相關資訊</span>
        </a>
      </li>
      <li>
        <a href="../menu/info.html">
          <img src="../../public/menu/info.svg" alt="" class="menu-icon"/>
          <span data-zh="關於我們" data-en="About Us">關於我們</span>
        </a>
      </li>
    </ul>
  </nav>
  <div class="top-left-controls">
    <button class="btn" id="alignBtn" aria-label="Align left">
      <img id="alignIcon" src="../../public/menu/align-left.svg" alt="Align left" />
    </button>
  </div>
  <div class="controls">
    <button class="btn" id="musicBtn" aria-label="Toggle music">
      <img id="musicIcon" src="../../public/menu/music.svg" alt="Music" />
    </button>
    <button class="btn" id="langBtn" aria-label="Toggle language">
      <span id="langText">EN</span>
    </button>
  </div>

  <div class="game-container" id="gameContainer">
    
    <div class="choices-container show" id="choicesContainer">
      <div class="choices-title" id="choicesTitle">請選擇你的生長方式：</div>
      <ul class="choices-list">
        <li><button class="choice-button" id="btnStable" data-choice="stable">穩定生長</button></li>
        <li><button class="choice-button" id="btnPesticide" data-choice="pesticide">使用檸檬烯</button></li>
      </ul>
    </div>

    <div class="image-relative-wrapper">
      <div class="story-text-box blur" id="storyTextBox">
        <div id="storyText">你無法移動，只能選擇「如何成長」。</div>
      </div>
      <img class="game-image blurred" style="filter: blur(8px);" src="../../public/pictures/2-1.png" alt="2-1 scene" />
    </div>

  </div>

  <script src="../../public/js/shared-controls.js"></script>
  <script>
    const choiceButtons = document.querySelectorAll('.choice-button');

    const localLanguageData = {
      zh: {
        title: '請選擇你的生長方式：',
        stable: '穩定生長',
        pesticide: '使用檸檬烯',
        story: '你無法移動，只能選擇「如何成長」。'
      },
      en: {
        title: 'Choose your growth strategy:',
        stable: 'Stable Growth',
        pesticide: 'Apply Limonene',
        story: 'Stationary and rooted, your only choice is "how to grow".'
      }
    };

    function updatePageLanguage(lang) {
      const data = localLanguageData[lang] || localLanguageData['zh'];
      
      document.querySelectorAll('[data-zh]').forEach(el => {
        el.innerText = lang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-zh');
      });

      const titleEl = document.getElementById('choicesTitle');
      const btnStable = document.getElementById('btnStable');
      const btnPesticide = document.getElementById('btnPesticide');
      const btnLimonene = document.getElementById('btnLimonene');
      const storyTextEl = document.getElementById('storyText');

      if (titleEl) titleEl.innerText = data.title;
      if (btnStable) btnStable.innerText = data.stable;
      if (btnPesticide) btnPesticide.innerText = data.pesticide;
      if (btnLimonene) btnLimonene.innerText = data.limonene;
      if (storyTextEl) storyTextEl.innerText = data.story;
    }

    window.addEventListener('languageChanged', (event) => {
      updatePageLanguage(event.detail.lang);
    });

    window.addEventListener('load', () => {
      localStorage.setItem('currentGamePage', window.location.href);

      const initialLang = (document.getElementById('langText')?.innerText === 'ZH') ? 'en' : 'zh';
      updatePageLanguage(initialLang);
    });

    choiceButtons.forEach(button => {
        button.addEventListener('click', function() {
        const choice = this.getAttribute('data-choice');
        localStorage.setItem('growth_choice', choice);
    
        // 根據選擇的內容跳轉到不同的檔案
        if (choice === 'stable') {
            window.location.href = '2-2-7.html'; // 這裡改為你的目標頁面1
        } else if (choice === 'pesticide') {
            window.location.href = '2-2-8-1.html'; // 這裡改為你的目標頁面2
        }
        });
    });
  </script>
</body>
</html>
