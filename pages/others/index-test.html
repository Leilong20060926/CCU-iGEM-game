<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoFold</title>
  <link rel="stylesheet" href="../public/css/shared.css" />
  <style>
    .game-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 1;
      width: 100%;
    }

    /* 新增一個與圖片同寬的包覆層，讓按鈕的百分比定位永遠相對於「黑框圖片本身」 */
    .image-relative-wrapper {
      position: relative;
      display: inline-block;
      width: calc(100% - 1002px); /* 繼承你原本圖片的 RWD 寬度計算 */
      min-width: 270px;           /* 防止極端小螢幕下過度縮小 */
      margin: auto;
    }

    .game-image {
      display: block;
      width: 100%;                /* 寬度改為滿滿撐開父層 */
      height: auto;
      border: 2px solid #000;
    }

    /* 這裡的百分比現在會精準黏在黑框圖上，不再受螢幕左右留白影響 */
    .start-button {
      position: absolute;
      left: 25%;                  /* 調整此數值改變左右位置 (0%最左, 100%最右) */
      top: 25%;                   /* 調整此數值改變上下位置 (0%最頂, 100%最底) */
      transform: translate(-50%, -50%);
      cursor: pointer;
      z-index: 2;
      background: transparent;
      border: none;
      padding: 0;
    }

    .start-button:hover .png-button {
      transform: scale(1.04);
    }

    .start-button:active .png-button {
      transform: scale(0.98);
    }

    .png-button {
      width: 85px;
      height: 53px;
      background-image: url('../public/buttoms/Homepage_buttom.PNG');
      background-size: contain;
      background-repeat: no-repeat;
      background-color: transparent;
      border: none;
      cursor: pointer;
      text-indent: -9999px;
      transition: transform 0.2s ease;
    }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar" id="sidebar">
    <ul class="sidebar-menu">
      <li>
        <a href="index.html" id="backToGameBtn">
          <img src="../public/menu/left.svg" alt="" class="menu-icon"/>
          <span data-zh="回到遊戲" data-en="Back to Game">回到遊戲</span>
        </a>
      </li>
      <li>
        <a href="menu/star.html">
          <img src="../public/menu/star.svg" alt="" class="menu-icon"/>
          <span data-zh="收集結局" data-en="Endings">收集結局</span>
        </a>
      </li>
      <li>
        <a href="menu/egg.html">
          <img src="../public/menu/egg.svg" alt="" class="menu-icon"/>
          <span data-zh="遊戲彩蛋" data-en="Easter Eggs">遊戲彩蛋</span>
        </a>
      </li>
      <li>
        <a href="menu/doc.html">
          <img src="../public/menu/doc.svg" class="menu-icon"/>
          <span data-zh="相關資訊" data-en="Information">相關資訊</span>
        </a>
      </li>
      <li>
        <a href="menu/info.html">
          <img src="../public/menu/info.svg" alt="" class="menu-icon"/>
          <span data-zh="關於我們" data-en="About Us">關於我們</span>
        </a>
      </li>
    </ul>
  </nav>
  <div class="top-left-controls">
    <button class="btn" id="alignBtn" aria-label="Align left">
      <img id="alignIcon" src="../public/menu/align-left.svg" alt="Align left" />
    </button>
  </div>
  <div class="controls">
    <button class="btn" id="musicBtn" aria-label="Toggle music">
      <img id="musicIcon" src="../public/menu/music.svg" alt="Music" />
    </button>
    <button class="btn" id="langBtn" aria-label="Toggle language">
      <span id="langText">EN</span>
    </button>
  </div>

  <div class="game-container" id="gameContainer">
    <div class="image-relative-wrapper">
      <img class="game-image" src="../public/pictures/homepage.PNG" alt="homepage" />
      <a class="start-button" href="character.html">
        <button class="png-button">前往下一頁</button>
      </a>
    </div>
  </div>

  <script src="../public/js/shared-controls.js"></script>
  <script>
    localStorage.setItem('currentGamePage', window.location.href);

    // 監聽來自 shared-controls.js 的語系變更事件以更新選單語系
    window.addEventListener('languageChanged', (event) => {
      const currentLang = event.detail.lang;
      document.querySelectorAll('[data-zh]').forEach(el => {
        el.innerText = currentLang === 'en' ? el.getAttribute('data-en') : el.getAttribute('data-zh');
      });
    });
  </script>
</body>
</html>
